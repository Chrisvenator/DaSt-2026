# Configuration for the final trained model.

experiment:
  id: severity_rf_baseline_v1
  description: Random Forest baseline for predicting accident severity from DBRepo accident features.

model:
  type: random_forest_classifier
  artifact_path: outputs/models/severity_rf_baseline_v1.joblib

hyperparameters:
  n_estimators: 100
  max_depth: null
  min_samples_split: 2
  min_samples_leaf: 1
  class_weight: balanced
  random_state: 42
