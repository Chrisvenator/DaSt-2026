experiment: baseline    # matches {experiment} field in file naming convention

model:
  name: random_forest   # options: logistic_regression | random_forest | xgboost
  artifact_path: outputs/models/rf_baseline_v1.pkl

hyperparameters:
  # Random Forest
  n_estimators: 100
  max_depth: null       # null = unlimited
  min_samples_split: 2
  class_weight: balanced

  # Logistic Regression (used when model.name = logistic_regression)
  # C: 1.0
  # max_iter: 1000

random_seed: 42
