# Configuration for the final ML experiment.
# The experiment reads the ML-ready DBRepo view and predicts accident severity.

dataset:
  name: road_safety_north_yorkshire
  source: dbrepo
  dbrepo_base_url: https://test.dbrepo.tuwien.ac.at
  database_id: f36ef3e2-1aee-4526-b3ea-82f661a9261a
  view_name: ml_accident_features
  view_id: 45b21a9f-1b85-4035-8f1f-4fb699b70f5e
  expected_rows: 8358
  page_size: 1000

task:
  name: accident_severity_classification
  target_column: severity_id
  target_labels:
    1: fatal
    2: serious
    3: slight

split:
  test_size: 0.2
  random_seed: 42
  stratify: true

features:
  drop_columns:
    - police_ref
    - accident_date
    - accident_time
    - lad_name

  categorical_columns:
    - day_of_week
    - road_cond_id
    - light_condition_id
    - weather_condition_id
    - special_condition_id
    - carriageway_hazard_id
    - road_type_id
    - junction_detail_id
    - junction_control_id
    - crossing_control_id
    - crossing_facility_id
    - rural_urban

  numeric_columns:
    - easting
    - northing
    - longitude
    - latitude
    - speed_limit_mph
    - casualties
    - vehicles
    - area_hectares
